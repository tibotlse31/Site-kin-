<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visualiseur — VestibLab VPPB</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, #e7eef8 100%);
      color: #173d70;
    }

    .topbar {
      background: linear-gradient(135deg, #1f66c1 0%, #0f4fa8 100%);
      color: white;
      padding: 20px 24px 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
    }

    .topbar-inner,
    .container {
      max-width: 1240px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: rgba(255,255,255,.96);
      text-decoration: none;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      margin: 0 0 8px;
    }

    .subtitle {
      margin: 0;
      opacity: .95;
      font-size: 1.02rem;
    }

    .container {
      padding: 26px 18px 46px;
    }

    .card {
      background: #fff;
      border: 1px solid #dbe7f5;
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(20, 55, 110, .10);
      padding: 22px;
      margin-bottom: 20px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control label {
      font-weight: 700;
      color: #173d70;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #cfe0f5;
      background: #fff;
      color: #173d70;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.55fr .85fr;
      gap: 18px;
    }

    .viz-shell {
      background: #f8fbff;
      border: 1px solid #dbe7f5;
      border-radius: 18px;
      overflow: hidden;
      min-height: 700px;
    }

    #svgHost {
      width: 100%;
      min-height: 700px;
    }

    .sidecol {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .box {
      background: #fff;
      border: 1px solid #dbe7f5;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(20, 55, 110, .08);
      padding: 20px;
    }

    .box h2, .box h3 {
      font-family: 'Montserrat', sans-serif;
      margin-top: 0;
      color: #173d70;
    }

    .step-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .step-actions button {
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: .96rem;
    }

    .btn-primary {
      background: #1f66c1;
      color: white;
    }

    .btn-soft {
      background: #eaf3ff;
      color: #0f4fa8;
    }

    .note {
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 12px;
      line-height: 1.55;
    }

    .note.info {
      background: #eef7ff;
      border: 1px solid #d5e9ff;
    }

    .note.warn {
      background: #fff8ec;
      border: 1px solid #f2dfb4;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .92rem;
    }

    .badge.success {
      background: #eaf6ee;
      color: #1e7b45;
      border: 1px solid #cde6d6;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .step-actions {
        grid-template-columns: repeat(2, 1fr);
      }

      #svgHost,
      .viz-shell {
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-link" href="vestibulaire.html">← Retour au module vestibulaire</a>
      <h1>Visualiseur diagnostique</h1>
      <p class="subtitle">Support visuel d’appoint pour les tests diagnostiques VPPB.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="controls">
        <div class="control">
          <label for="channelSelect">Canal</label>
          <select id="channelSelect"></select>
        </div>

        <div class="control">
          <label for="testSelect">Test</label>
          <select id="testSelect"></select>
        </div>

        <div class="control">
          <label for="sideSelect">Côté atteint</label>
          <select id="sideSelect">
            <option value="right">Droite</option>
            <option value="left">Gauche</option>
          </select>
        </div>

        <div class="control" id="variantWrap">
          <label for="variantSelect">Variante horizontale</label>
          <select id="variantSelect">
            <option value="geotropic">Géotropique</option>
            <option value="ageotropic">Agéotropique</option>
            <option value="cupulo">Cupulolithiase</option>
          </select>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="viz-shell">
        <div id="svgHost"></div>
      </div>

      <div class="sidecol">
        <div class="box">
          <div class="step-actions">
            <button class="btn-soft" id="prevBtn">← Précédent</button>
            <button class="btn-primary" id="playBtn">▶ Jouer</button>
            <button class="btn-soft" id="nextBtn">Suivant →</button>
            <button class="btn-soft" id="resetBtn">↺ Réinitialiser</button>
          </div>
        </div>

        <div class="box" id="stepBox"></div>
        <div class="box" id="interpretBox"></div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="visualiseur.js"></script>
</body>
</html>

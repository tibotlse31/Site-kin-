<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VestibLab VPPB — pièges</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="header compact">
    <div class="shell">
      <div class="topbar">
        <a class="back-link" href="vestibulaire.html">← Accueil</a>
        <div class="brand">Module pièges / red flags</div>
      </div>
      <div class="tagline">Tout ce qui doit freiner un automatisme : atypies, diagnostics différentiels, signes d’alerte et erreurs de stratégie.</div>
      <div class="nav-row" id="pageNav"></div>
    </div>
  </header>

  <main class="page">
    <div class="shell stack">
      <section class="hero-card">
        <span class="badge danger">🚩 À relire avant de traiter</span>
        <h1 class="h1" style="margin-top:10px">Pièges communs à tous les canaux</h1>
        <div id="globalFlags" style="margin-top:16px"></div>
      </section>

      <section class="two-col" id="channelFlagCards"></section>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    APP.pageNav('pieges.html');
    document.getElementById('globalFlags').innerHTML = APP.renderList(COURSE_DATA.redFlags);
    document.getElementById('channelFlagCards').innerHTML = Object.values(COURSE_DATA.channels).map(c => `
      <article class="panel">
        <div class="badge warning">${c.icon} ${c.name}</div>
        <h2 class="h2" style="margin-top:12px">Points de vigilance</h2>
        <p class="lead">${c.summary}</p>
        ${APP.renderList(c.redFlags)}
      </article>
    `).join('');
  </script>
</body>
</html>

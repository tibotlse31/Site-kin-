<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulateur VPPB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      background: #f8fbff;
      color: #123;
      margin: 0;
      padding: 40px 20px;
    }

    .container-box {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1, h2, h3 {
      font-family: 'Montserrat', sans-serif;
      color: #1565c0;
    }

    h1 {
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .intro {
      margin-bottom: 2rem;
    }

    .filters-card,
    .results-card {
      background: #ffffff;
      border: 1px solid #e3eefc;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .filters-card {
      margin-bottom: 1.5rem;
      background: #f7fbff;
    }

    .form-label {
      font-weight: 600;
      color: #0d47a1;
    }

    .form-select {
      border-radius: 10px;
    }

    .results-card h2 {
      margin-bottom: 1rem;
    }

    .results-card h3 {
      margin-top: 1.25rem;
      font-size: 1.1rem;
    }

    .results-card ul {
      padding-left: 1.2rem;
      margin-bottom: 0.75rem;
    }

    .results-card li {
      margin-bottom: 0.35rem;
    }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      background: #1976d2;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }

    .links a:hover {
      background: #1565c0;
    }

    #result-debug {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    @media (max-width: 576px) {
      body {
        padding: 20px 12px;
      }

      .container-box {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container-box">
    <h1>Simulateur VPPB</h1>
    <p class="intro">
      Sélectionne les paramètres cliniques pour afficher le tableau compatible, le nystagmus attendu,
      la logique biomécanique et les manœuvres recommandées.
    </p>

    <div class="filters-card">
      <div class="row g-3">
        <div class="col-md-6 col-lg-4">
          <label for="canal" class="form-label">Canal</label>
          <select id="canal" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-4">
          <label for="side" class="form-label">Côté</label>
          <select id="side" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-4">
          <label for="mechanism" class="form-label">Mécanisme</label>
          <select id="mechanism" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-4">
          <label for="variant" class="form-label">Forme</label>
          <select id="variant" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-4">
          <label for="diagnostic_test" class="form-label">Test diagnostique</label>
          <select id="diagnostic_test" class="form-select"></select>
        </div>
      </div>
    </div>

    <div class="results-card">
      <h2 id="result-title">Simulateur VPPB</h2>
      <div id="result-summary" class="mb-3"></div>
      <div id="result-nystagmus" class="mb-3"></div>
      <div id="result-biomechanics" class="mb-3"></div>
      <div id="result-maneuvers" class="mb-3"></div>
      <div id="result-advice" class="mb-3"></div>
      <div id="result-pitfalls" class="mb-3"></div>
      <div id="result-red-flags" class="mb-3"></div>
      <div id="result-debug" class="text-muted"></div>
    </div>

    <div class="links">
      <a href="vestibulaire.html">Retour vestibulaire</a>
      <a href="index.html">Accueil</a>
    </div>
  </div>

  <script src="js/vppb.js"></script>
</body>
</html>
